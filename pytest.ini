[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --ignore=usage_tracker.py
    --ignore=shift_manager.py
    --ignore=weekly_report.py
    --ignore=report_generator.py
    --ignore=report_utils.py
    --ignore=validate_db_setup.py
    --ignore=generate_shifts_and_validate.py
    --ignore=consolidate_logs.py
    --ignore=upload_logs.py

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# Coverage options (if pytest-cov is installed)
# addopts = --cov=. --cov-report=html

# Timeout for tests (requires pytest-timeout)
# timeout = 300
